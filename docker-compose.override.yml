services:
  openclaw-gateway:
    build:
      context: .
      args:
        OPENCLAW_DOCKER_APT_PACKAGES: "postgresql-client"
    # Secrets like RESEND_API_KEY: use env_file so compose interpolation cannot override them with empty ${VAR:-}.
    env_file:
      - .env
    environment:
      GOG_KEYRING_PASSWORD: ${GOG_KEYRING_PASSWORD:-} 
      VIRALSKY_DB_URL: ${VIRALSKY_DB_URL:-}
      SKYSNAIL_DB_URL: ${SKYSNAIL_DB_URL:-}
      ANDERRO_DB_URL: ${ANDERRO_DB_URL:-}
      FOODIENT_DB_URL: ${FOODIENT_DB_URL:-}
      AITRENDZ_WP_APP_PASS: ${AITRENDZ_WP_APP_PASS:-}
      RESEND_API_KEY : ${RESEND_API_KEY:-}
      STRIPE_SKYSNAIL_READ_KEY: ${STRIPE_SKYSNAIL_READ_KEY:-}
      STRIPE_ANDERRO_READ_KEY: ${STRIPE_ANDERRO_READ_KEY:-}
      STRIPE_VIRALSKY_READ_KEY: ${STRIPE_VIRALSKY_READ_KEY:-}
      STRIPE_FOODIENT_READ_KEY: ${STRIPE_FOODIENT_READ_KEY:-}
    command:
      [
        "node",
        "dist/index.js",
        "gateway",
        "--bind",
        "${OPENCLAW_GATEWAY_BIND:-lan}",
        "--port",
        "18789",
        "--allow-unconfigured",
      ]
